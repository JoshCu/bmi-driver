[package]
name = "bmi"
version = "0.1.0"
edition = "2021"

[dependencies]
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
netcdf = { version = "0.11.1", default-features = false }
rusqlite = "0.37.0"
clap = { version = "4.5.53", features = ["derive"] }
anyhow = "1.0.100"

[[bin]]
name = "bmi-runner"
path = "src/main.rs"
