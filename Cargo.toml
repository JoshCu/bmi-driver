[package]
name = "bmi-rs"
version = "0.2.0"
edition = "2021"
description = "Rust adapter for Basic Model Interface (BMI) C and Fortran libraries"
license = "MIT"

[lib]
name = "bmi"
path = "src/lib.rs"

[[bin]]
name = "bmi-example"
path = "src/main.rs"

[dependencies]
netcdf = {version = "0.11.1", default-features = false}
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "1.0"
